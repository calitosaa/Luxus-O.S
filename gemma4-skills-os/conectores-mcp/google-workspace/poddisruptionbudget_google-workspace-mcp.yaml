---
source_repo: https://github.com/taylorwilsdon/google_workspace_mcp
source_file: helm-chart/workspace-mcp/templates/poddisruptionbudget.yaml
license: MIT
category: conectores-mcp/google-workspace
imported_at: 2026-04-19
---

{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "workspace-mcp.fullname" . }}
  labels:
    {{- include "workspace-mcp.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "workspace-mcp.selectorLabels" . | nindent 6 }}
  {{- if .Values.podDisruptionBudget.minAvailable }}
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  {{- end }}
  {{- if .Values.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ .Values.podDisruptionBudget.maxUnavailable }}
  {{- end }}
{{- end }}