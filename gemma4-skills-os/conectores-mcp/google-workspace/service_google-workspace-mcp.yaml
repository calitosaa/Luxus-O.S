---
source_repo: https://github.com/taylorwilsdon/google_workspace_mcp
source_file: helm-chart/workspace-mcp/templates/service.yaml
license: MIT
category: conectores-mcp/google-workspace
imported_at: 2026-04-19
---

apiVersion: v1
kind: Service
metadata:
  name: {{ include "workspace-mcp.fullname" . }}
  labels:
    {{- include "workspace-mcp.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "workspace-mcp.selectorLabels" . | nindent 4 }}