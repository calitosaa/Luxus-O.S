---
source_repo: https://github.com/taylorwilsdon/google_workspace_mcp
source_file: helm-chart/workspace-mcp/templates/configmap.yaml
license: MIT
category: conectores-mcp/google-workspace
imported_at: 2026-04-19
---

{{- if .Values.env }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "workspace-mcp.fullname" . }}-config
  labels:
    {{- include "workspace-mcp.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}