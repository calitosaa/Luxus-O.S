---
source_repo: https://github.com/iOfficeAI/AionUi
source_file: .codecov.yml
license: MIT
category: skills/coding
imported_at: 2026-04-19
---

codecov:
  require_ci_to_pass: false

coverage:
  status:
    patch:
      default:
        target: auto
        threshold: 10%
        informational: true
    project:
      default:
        target: auto
        threshold: 5%

ignore:
  - '**/*.json'
  - '**/*.md'
  - '**/*.txt'
  - '**/*.html'
  - '**/*.css'
  - '**/*.svg'
  - '**/*.png'
  - '**/*.jpg'
  - '**/*.gif'
  - '**/*.woff*'
  - '**/*.ttf'
  - '**/*.lock'
  - 'docs/'
  - 'examples/'
  - 'mobile/'
  - 'scripts/'
  - 'tests/'
