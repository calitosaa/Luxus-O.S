quot;:
        \\u0026quot;For the model to use the knowledge, it must be part of its context;
        the key is *how* it\\u0026#39;s added to that context.\\u0026quot;,\\n          \\u0026quot;isCorrect\\u0026quot;:
        false\\n        }\\n      ],\\n      \\u0026quot;hint\\u0026quot;: \\u0026quot;The
        correct method avoids changing the beginning or middle of the conversation
        history.\\u0026quot;\\n    },\\n    {\\n      \\u0026quot;question\\u0026quot;:
        \\u0026quot;Which of these is NOT one of the four essential tools introduced
        in the `v1_basic_agent.py` to cover most coding use cases?\\u0026quot;,\\n      \\u0026quot;answerOptions\\u0026quot;:
        [\\n        {\\n          \\u0026quot;text\\u0026quot;: \\u0026quot;`bash`\\u0026quot;,\\n          \\u0026quot;rationale\\u0026quot;:
        \\u0026quot;`bash` is included as the gateway tool for running any command-line
        operation.\\u0026quot;,\\n          \\u0026quot;isCorrect\\u0026quot;: false\\n        },\\n        {\\n          \\u0026quot;text\\u0026quot;:
        \\u0026quot;`read_file`\\u0026quot;,\\n          \\u0026quot;rationale\\u0026quot;:
        \\u0026quot;`read_file` is included as an essential tool for understanding
        existing code.\\u0026quot;,\\n          \\u0026quot;isCorrect\\u0026quot;:
        false\\n        },\\n        {\\n          \\u0026quot;text\\u0026quot;: \\u0026quot;`TodoWrite`\\u0026quot;,\\n          \\u0026quot;rationale\\u0026quot;:
        \\u0026quot;`TodoWrite` is the specialized tool for structured planning introduced
        in the `v2` agent.\\u0026quot;,\\n          \\u0026quot;isCorrect\\u0026quot;:
        true\\n        },\\n        {\\n          \\u0026quot;text\\u0026quot;: \\u0026quot;`edit_file`\\u0026quot;,\\n          \\u0026quot;rationale\\u0026quot;:
        \\u0026quot;`edit_file` is included for making surgical changes to existing
        files.\\u0026quot;,\\n          \\u0026quot;isCorrect\\u0026quot;: false\\n        }\\n      ],\\n      \\u0026quot;hint\\u0026quot;:
        \\u0026quot;The first version of the agent focused on core capabilities for
        interacting with the file system and shell, not on complex planning.\\u0026quot;\\n    },\\n    {\\n      \\u0026quot;question\\u0026quot;:
        \\u0026quot;What is the fundamental logic of the \\\\\\u0026quot;core agent
        loop\\\\\\u0026quot; described throughout the project?\\u0026quot;,\\n      \\u0026quot;answerOptions\\u0026quot;:
        [\\n        {\\n          \\u0026quot;text\\u0026quot;: \\u0026quot;The agent
        first creates a complete, unchangeable plan and then executes each step in
        sequence.\\u0026quot;,\\n          \\u0026quot;rationale\\u0026quot;: \\u0026quot;The
        agent loop is iterative and reactive; the result of one tool call informs
        the model\\u0026#39;s decision for the next one.\\u0026quot;,\\n          \\u0026quot;isCorrect\\u0026quot;:
        false\\n        },\\n        {\\n          \\u0026quot;text\\u0026quot;: \\u0026quot;The
        model makes a tool call, the tool\\u0026#39;s result is added to the history,
        and this cycle repeats until the model stops calling tools.\\u0026quot;,\\n          \\u0026quot;rationale\\u0026quot;:
        \\u0026quot;This accurately describes the iterative process where the model
        is the decision-maker, acting in a loop until the task is complete.\\u0026quot;,\\n          \\u0026quot;isCorrect\\u0026quot;:
        true\\n        },\\n        {\\n          \\u0026quot;text\\u0026quot;: \\u0026quot;The
        user provides a precise sequence of tools for the agent to execute.\\u0026quot;,\\n          \\u0026quot;rationale\\u0026quot;:
        \\u0026quot;In this agent model, the user provides a high-level goal, and
        the AI model itself decides which tools to use and in what order.\\u0026quot;,\\n          \\u0026quot;isCorrect\\u0026quot;:
        false\\n        },\\n        {\\n          \\u0026quot;text\\u0026quot;: \\u0026quot;The
        agent\\u0026#39;s code analyzes the prompt and selects a single, optimal tool
        to resolve the entire request.\\u0026quot;,\\n          \\u0026quot;rationale\\u0026quot;:
        \\u0026quot;The power of the agent comes from its ability to use multiple
        tools sequentially over several turns, not from picking just one.\\u0026quot;,\\n          \\u0026quot;isCorrect\\u0026quot;:
        false\\n        }\\n      ],\\n      \\u0026quot;hint\\u0026quot;: \\u0026quot;It
        is a repetitive cycle of thinking, acting, and observing the results.\\u0026quot;\\n    },\\n    {\\n      \\u0026quot;question\\u0026quot;:
        \\u0026quot;In the `v3` subagent mechanism, what is the purpose of the `AGENT_TYPES`
        registry?\\u0026quot;,\\n      \\u0026quot;answerOptions\\u0026quot;: [\\n        {\\n          \\u0026quot;text\\u0026quot;:
        \\u0026quot;To define different subagent archetypes with specific roles, prompts,
        and restricted toolsets.\\u0026quot;,\\n          \\u0026quot;rationale\\u0026quot;:
        \\u0026quot;This registry allows the main agent to spawn specialized subagents,
        such as a read-only \\u0026#39;explore\\u0026#39; agent or a full-powered
        \\u0026#39;code\\u0026#39; agent.\\u0026quot;,\\n          \\u0026quot;isCorrect\\u0026quot;:
        true\\n        },\\n        {\\n          \\u0026quot;text\\u0026quot;: \\u0026quot;To
        list all the available skills and their descriptions for the `v4` agent.\\u0026quot;,\\n          \\u0026quot;rationale\\u0026quot;:
        \\u0026quot;The listing of skills is handled by the `SkillLoader` class, which
        is a concept from `v4`, not `v3`.\\u0026quot;,\\n          \\u0026quot;isCorrect\\u0026quot;:
        false\\n        },\\n        {\\n          \\u0026quot;text\\u0026quot;: \\u0026quot;To
        keep a real-time log of all active subagent processes and their current status.\\u0026quot;,\\n          \\u0026quot;rationale\\u0026quot;:
        \\u0026quot;The registry is a static configuration defining agent types, not
        a dynamic process manager that tracks running instances.\\u0026quot;,\\n          \\u0026quot;isCorrect\\u0026quot;:
        false\\n        },\\n        {\\n          \\u0026quot;text\\u0026quot;: \\u0026quot;To
        provide the input schema and validation rules for the `TodoWrite` tool.\\u0026quot;,\\n          \\u0026quot;rationale\\u0026quot;:
        \\u0026quot;A tool\\u0026#39;s input schema is defined within the tool\\u0026#39;s
        own JSON definition, not in the agent type registry.\\u0026quot;,\\n          \\u0026quot;isCorrect\\u0026quot;:
        false\\n        }\\n      ],\\n      \\u0026quot;hint\\u0026quot;: \\u0026quot;This
        configuration allows the main agent to choose the right kind of \\u0026#39;specialist\\u0026#39;
