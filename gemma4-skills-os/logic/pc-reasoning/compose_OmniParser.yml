---
source_repo: https://github.com/microsoft/OmniParser
source_file: omnitool/omnibox/compose.yml
license: MIT
category: logic/pc-reasoning
imported_at: 2026-04-19
---

services:
  windows:
    image: windows-local
    container_name: omni-windows
    privileged: true
    environment:
      RAM_SIZE: "8G"
      CPU_CORES: "4"
      DISK_SIZE: "20G"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006                 # Web Viewer access
    volumes:
      - ./vm/win11iso/custom.iso:/custom.iso
      - ./vm/win11setup/firstboot:/oem
      - ./vm/win11setup/setupscripts:/data
      - ./vm/win11storage:/storage
    