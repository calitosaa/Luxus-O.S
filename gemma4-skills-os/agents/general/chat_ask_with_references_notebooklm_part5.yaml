        Code** is an **agentic coding tool** developed by Anthropic that operates
        directly within the developer's terminal [1, 2]. It is designed to act as
        an **autonomous agent** that can navigate codebases, execute commands, and
        edit files to solve complex engineering tasks [2, 3]. The system is built
        on a \\\\\\\"harness\\\\\\\" design that provides the underlying Claude models
        with the specific tools and context needed to complete work synchronously
        or asynchronously [4, 5].\\\\n\\\\n### **Context Management and Engineering**\\\\nEfficiently
        managing the **context window** (typically 200k tokens) is the primary challenge
        and unifying theme of Claude Code\u2019s major features [5, 6].\\\\n*   **CLAUDE.md
        files:** These are special project memory files that Claude automatically
        reads at the start of a session to understand build commands, code styles,
        and project conventions [7, 8].\\\\n*   **Progressive Disclosure:** To prevent
        context saturation, detailed reference material and documentation should be
        kept in separate files and linked from the main `SKILL.md`, allowing Claude
        to read them only when necessary [9, 10].\\\\n*   **Compaction:** When a conversation
        approaches its token limit, Claude can automatically **summarize earlier messages**
        to free up space while preserving the most critical information [11, 12].\\\\n\\\\n###
        **Specialized Capabilities: Skills and Subagents**\\\\nClaude Code uses distinct
        mechanisms to extend its knowledge and delegate complex tasks.\\\\n*   **Agent
        Skills:** These are folders containing instructions and scripts that teach
        Claude **repeatable workflows**, such as reviewing pull requests or processing
        specific file types [13-15]. Unlike commands, skills are **model-invoked**,
        meaning Claude automatically decides to use them when your request matches
        the skill\u2019s natural language description [15-17].\\\\n*   **Subagents:**
        These are specialized assistants with **independent context windows** and
        specific tool access [18]. They are ideal for isolating verbose tasks\u2014like
        running large test suites or searching logs\u2014keeping the main conversation
        window clean and efficient [19-21].\\\\n*   **Custom Slash Commands:** Users
        can package frequently used prompts as markdown files to be executed manually
        for single-shot tasks like code optimization or standardizing PR descriptions
        [22-24].\\\\n\\\\n### **Extensibility and Semantic Search**\\\\nThe tool integrates
        with broader ecosystems to enhance its understanding of the world and code.\\\\n*
        \  **Model Context Protocol (MCP):** This open standard allows Claude to connect
        to **external data sources** (like Slack, Google Drive, and GitHub) and third-party
        tools without requiring custom integration code for every service [25, 26].\\\\n*
        \  **Language Server Protocol (LSP):** Claude Code can leverage LSP features
        like **go-to-definition** and find references, allowing it to understand code
        semantically rather than relying on simple text searching (grep) [27-29].\\\\n*
        \  **Semantic Search:** Advanced indexing tools can transform a codebase into
        **vector representations**, enabling Claude to find relevant code blocks based
        on intent and concepts rather than just matching keywords [30-32].\\\\n\\\\n###
