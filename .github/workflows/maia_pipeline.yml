name: MAIA LLM Pipeline

on:
  workflow_dispatch:
    inputs:
      push_to_hub:
        description: "Push dataset to HuggingFace Hub"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      run_training:
        description: "Trigger AutoTrain fine-tuning on HF"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
  push:
    branches: [main]
    paths:
      - "scripts/classify_and_clean.py"
      - "scripts/to_jsonl.py"
      - "scripts/verify_dataset.py"

concurrency:
  group: maia-pipeline-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Data pipeline (CPU-only, free runner) ──────────────────────────
  data-pipeline:
    name: "📦 Data pipeline — classify → JSONL → verify"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    outputs:
      train_examples: ${{ steps.stats.outputs.train }}
      val_examples:   ${{ steps.stats.outputs.val }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime dependencies
        run: pip install --quiet huggingface_hub datasets

      - name: "Step 0 — Classify & clean"
        run: python scripts/classify_and_clean.py

      - name: "Step 1 — Build JSONL dataset"
        run: python scripts/to_jsonl.py

      - name: "Step 2 — Verify dataset"
        id: stats
        run: |
          python scripts/verify_dataset.py
          TRAIN=$(python -c "import json; d=json.load(open('dataset/stats.json')); print(d['train']['total'])")
          VAL=$(python   -c "import json; d=json.load(open('dataset/stats.json')); print(d['val']['total'])")
          echo "train=$TRAIN" >> $GITHUB_OUTPUT
          echo "val=$VAL"   >> $GITHUB_OUTPUT
          echo "### Dataset stats" >> $GITHUB_STEP_SUMMARY
          echo "| Split | Examples |"  >> $GITHUB_STEP_SUMMARY
          echo "|-------|----------|"  >> $GITHUB_STEP_SUMMARY
          echo "| Train | $TRAIN   |"  >> $GITHUB_STEP_SUMMARY
          echo "| Val   | $VAL     |"  >> $GITHUB_STEP_SUMMARY

      - name: Upload dataset artifacts (90-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: maia-dataset-${{ github.run_number }}
          retention-days: 90
          path: |
            dataset/maia_train.jsonl
            dataset/maia_val.jsonl
            dataset/stats.json
            dataset/classification_report.txt

  # ── Job 2: Push dataset to HuggingFace Hub ────────────────────────────────
  push-to-hub:
    name: "🤗 Push dataset → HuggingFace Hub"
    needs: data-pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.push_to_hub == 'true')
      || github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download dataset artifact
        uses: actions/download-artifact@v4
        with:
          name: maia-dataset-${{ github.run_number }}
          path: dataset/

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install --quiet huggingface_hub

      - name: Push to HuggingFace Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ vars.HF_DATASET_REPO || 'maia-training-data' }}
          HF_USERNAME:     ${{ vars.HF_USERNAME }}
        run: python scripts/push_to_hub.py

  # ── Job 3: Trigger HF AutoTrain fine-tuning ───────────────────────────────
  trigger-training:
    name: "🚀 Trigger MAIA fine-tuning (HF AutoTrain)"
    needs: push-to-hub
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event_name == 'workflow_dispatch'
      && github.event.inputs.run_training == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install autotrain + dependencies
        run: pip install --quiet autotrain-advanced huggingface_hub

      - name: Trigger AutoTrain fine-tuning job
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_USERNAME:     ${{ vars.HF_USERNAME }}
          HF_DATASET_REPO: ${{ vars.HF_DATASET_REPO || 'maia-training-data' }}
          BASE_MODEL:      ${{ vars.BASE_MODEL || 'google/gemma-3-4b-it' }}
          OUTPUT_MODEL:    ${{ vars.OUTPUT_MODEL || 'maia-gemma4-e4b' }}
        run: python scripts/train_maia.py --mode autotrain

      - name: Post training summary
        if: always()
        run: |
          echo "### Training job submitted" >> $GITHUB_STEP_SUMMARY
          echo "Check progress at: https://huggingface.co/${{ vars.HF_USERNAME }}/${{ vars.OUTPUT_MODEL || 'maia-gemma4-e4b' }}" >> $GITHUB_STEP_SUMMARY
