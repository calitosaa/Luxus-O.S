name: Auto Launch MAIA Training on Kaggle

on:
  push:
    paths:
      - 'finetuning/output/maia_gemma4_finetune.jsonl.part_03'
      - '.github/workflows/auto_launch_kaggle.yml'

jobs:
  launch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Configure Kaggle credentials
        env:
          KAGGLE_TOKEN_B64: S0dBVF8xMTIzZWFjNTlkMzllM2E2YzMyNTJhZTFlM2U5NWU1MQ==
        run: |
          KAGGLE_TOKEN=$(echo "${KAGGLE_TOKEN_B64}" | base64 -d)
          # Kaggle username assumed same as GitHub repo owner
          KAGGLE_USERNAME="${{ github.repository_owner }}"

          echo "KAGGLE_TOKEN=${KAGGLE_TOKEN}" >> $GITHUB_ENV
          echo "KAGGLE_USERNAME=${KAGGLE_USERNAME}" >> $GITHUB_ENV
          echo "Using Kaggle username: ${KAGGLE_USERNAME}"

          mkdir -p ~/.kaggle
          echo "{\"username\":\"${KAGGLE_USERNAME}\",\"key\":\"${KAGGLE_TOKEN}\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Add HF_TOKEN secret to Kaggle (if available)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -n "${HF_TOKEN}" ]; then
            curl -s -X POST "https://www.kaggle.com/api/v1/users/${KAGGLE_USERNAME}/secrets" \
              -u "${KAGGLE_USERNAME}:${KAGGLE_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"label\": \"HF_TOKEN\", \"value\": \"${HF_TOKEN}\"}" \
              || echo "Secret ya existe o no disponible — continuando"
          else
            echo "HF_TOKEN not set — model will be saved to Kaggle Dataset only"
          fi

      - name: Update kernel metadata with username
        run: |
          sed -i "s/KAGGLE_USERNAME/${KAGGLE_USERNAME}/g" finetuning/kaggle/kernel-metadata.json
          cat finetuning/kaggle/kernel-metadata.json

      - name: Push kernel to Kaggle
        run: |
          cd finetuning/kaggle
          kaggle kernels push -p .
          echo "Kernel subido a Kaggle"

      - name: Start kernel execution
        run: |
          sleep 15
          curl -s -X POST \
            "https://www.kaggle.com/api/v1/kernels/${KAGGLE_USERNAME}/maia-gemma4-training/run" \
            -u "${KAGGLE_USERNAME}:${KAGGLE_TOKEN}" \
            -H "Content-Type: application/json" || echo "Run trigger sent"
          echo "Entrenamiento lanzado"
          echo "Monitor: https://www.kaggle.com/${KAGGLE_USERNAME}/maia-gemma4-training"
          echo "IMPORTANTE: Regenera tu Kaggle token en https://www.kaggle.com/settings"
