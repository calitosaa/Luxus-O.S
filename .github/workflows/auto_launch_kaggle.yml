name: Auto Launch MAIA Training on Kaggle

on:
  push:
    paths:
      - 'finetuning/output/maia_gemma4_finetune.jsonl.part_03'
      - '.github/workflows/auto_launch_kaggle.yml'

jobs:
  launch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Discover Kaggle username from token
        env:
          KAGGLE_TOKEN_B64: S0dBVF84Nzk5ZmNlYzEwNDg1N2Y0M2I4OTM1NzgyM2ZiYjgxNQ==
        run: |
          KAGGLE_TOKEN=$(echo "${KAGGLE_TOKEN_B64}" | base64 -d)
          echo "KAGGLE_TOKEN=${KAGGLE_TOKEN}" >> $GITHUB_ENV
          echo "Token prefix: ${KAGGLE_TOKEN:0:8}..."

          # Try multiple endpoints to discover username
          KAGGLE_USERNAME=$(python3 - <<'PYEOF'
          import urllib.request, json, sys, os

          token = os.environ.get("KAGGLE_TOKEN_B64", "")
          import base64
          token = base64.b64decode(token).decode()

          endpoints = [
              "https://www.kaggle.com/api/v1/user",
              "https://www.kaggle.com/api/v1/users/whoami",
          ]
          headers_variants = [
              {"Authorization": f"Bearer {token}"},
              {"X-Kaggle-ApiKey": token},
          ]

          for url in endpoints:
              for headers in headers_variants:
                  try:
                      req = urllib.request.Request(url, headers=headers)
                      with urllib.request.urlopen(req, timeout=15) as r:
                          raw = r.read().decode()
                          print(f"DEBUG {url} {list(headers.keys())[0]}: {raw[:200]}", file=sys.stderr)
                          data = json.loads(raw)
                          username = (data.get("username") or data.get("userName") or
                                      data.get("name") or data.get("user", {}).get("username", ""))
                          if username:
                              print(username)
                              sys.exit(0)
                  except Exception as e:
                      print(f"DEBUG FAIL {url}: {e}", file=sys.stderr)

          # Fallback: try kaggle CLI with token-only auth (new format)
          try:
              import subprocess, os
              env = os.environ.copy()
              env["KAGGLE_KEY"] = token
              env["KAGGLE_USERNAME"] = ""
              result = subprocess.run(
                  ["python3", "-c",
                   "from kaggle.api.kaggle_api_extended import KaggleApiExtended; "
                   "a=KaggleApiExtended(); a.authenticate(); print(a.config_values.get('username',''))"],
                  env=env, capture_output=True, text=True, timeout=30
              )
              u = result.stdout.strip()
              print(f"DEBUG CLI: '{u}' stderr: {result.stderr[:100]}", file=sys.stderr)
              if u:
                  print(u)
                  sys.exit(0)
          except Exception as e:
              print(f"DEBUG CLI fallback failed: {e}", file=sys.stderr)

          sys.exit(1)
          PYEOF
          ) || true

          if [ -z "$KAGGLE_USERNAME" ]; then
            echo "ERROR: Could not discover Kaggle username. Check DEBUG lines above."
            exit 1
          fi

          echo "KAGGLE_USERNAME=${KAGGLE_USERNAME}" >> $GITHUB_ENV
          echo "Username discovered: ${KAGGLE_USERNAME}"

          mkdir -p ~/.kaggle
          echo "{\"username\":\"${KAGGLE_USERNAME}\",\"key\":\"${KAGGLE_TOKEN}\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Add HF_TOKEN secret to Kaggle (if available)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -n "${HF_TOKEN}" ]; then
            curl -s -X POST "https://www.kaggle.com/api/v1/users/${KAGGLE_USERNAME}/secrets" \
              -u "${KAGGLE_USERNAME}:${KAGGLE_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"label\": \"HF_TOKEN\", \"value\": \"${HF_TOKEN}\"}" \
              || echo "Secret ya existe o no disponible — continuando"
          else
            echo "HF_TOKEN not set — model will be saved to Kaggle Dataset only"
          fi

      - name: Update kernel metadata with username
        run: |
          sed -i "s/KAGGLE_USERNAME/${KAGGLE_USERNAME}/g" finetuning/kaggle/kernel-metadata.json
          cat finetuning/kaggle/kernel-metadata.json

      - name: Push kernel to Kaggle
        working-directory: finetuning/kaggle
        run: |
          kaggle kernels push -p .
          echo "Kernel subido a Kaggle"

      - name: Start kernel execution
        run: |
          sleep 15
          curl -s -X POST \
            "https://www.kaggle.com/api/v1/kernels/${KAGGLE_USERNAME}/maia-gemma4-training/run" \
            -u "${KAGGLE_USERNAME}:${KAGGLE_TOKEN}" \
            -H "Content-Type: application/json" || echo "Run trigger sent"
          echo "Entrenamiento lanzado en Kaggle"
          echo "Monitor: https://www.kaggle.com/${KAGGLE_USERNAME}/maia-gemma4-training"
          echo "IMPORTANTE: Regenera tu Kaggle token en https://www.kaggle.com/settings"
